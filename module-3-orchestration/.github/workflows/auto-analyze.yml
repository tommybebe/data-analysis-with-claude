# auto-analyze.yml — 7단계 이슈 기반 자동 데이터 분석 파이프라인
#
# 이 파일은 참조 템플릿입니다. 수강생은 이 파일을 기반으로
# 자신의 레포지토리에 맞게 수정하여 사용합니다.
#
# 동작 원리 (라벨 연쇄 전환):
#   1. 이슈에 auto-analyze 라벨 부착 → 워크플로 트리거
#   2. 각 단계 완료 후 현재 라벨 제거 + 다음 단계 라벨 부착
#   3. 라벨 부착 이벤트가 on.issues.types: [labeled] 를 재트리거
#   4. stage:7-report 완료 → done 라벨 부착 + PR 생성

name: Auto Analyze Pipeline

on:
  issues:
    types: [labeled]

# 워크플로 실행에 필요한 최소 권한
permissions:
  issues: write        # 이슈 코멘트 작성 + 라벨 부착/제거
  contents: write      # 파일 커밋, 브랜치 생성
  pull-requests: write # PR 생성 + 라벨 부착

jobs:
  analyze:
    # auto-analyze 또는 stage:* 라벨이 부착될 때만 실행
    if: |
      github.event.label.name == 'auto-analyze' ||
      startsWith(github.event.label.name, 'stage:')
    runs-on: ubuntu-latest

    steps:
      # ── 공통 준비 ──────────────────────────────────────────────────────────

      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: uv 설치
        uses: astral-sh/setup-uv@v4

      - name: 의존성 설치 (dbt-bigquery, marimo, claude-agent-sdk)
        run: uv sync --extra dev

      - name: GCP 서비스 계정 인증
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 이슈 정보 추출
        id: issue
        run: |
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "label=${{ github.event.label.name }}" >> $GITHUB_OUTPUT

      # ── 단계 1: 이슈 파싱 ──────────────────────────────────────────────────

      - name: "[단계 1] 이슈 파싱"
        if: github.event.label.name == 'auto-analyze'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          uv run python -c "
          import subprocess, os, sys
          # Claude Agent SDK로 단계 1 프롬프트 실행
          result = subprocess.run(
            ['uv', 'run', 'claude', '--print',
             '--system-prompt', open('.claude/prompts/stage-1-parse.md').read(),
             f'GitHub Issue #{os.environ[\"ISSUE_NUMBER\"]} 내용을 파싱하고 분석 요청을 구조화해줘.'],
            capture_output=True, text=True, check=True
          )
          print(result.stdout)
          "

      - name: "[단계 1 완료] 이슈 코멘트 작성 + 라벨 전환"
        if: github.event.label.name == 'auto-analyze'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "<!-- stage:1-complete -->
          ### ✅ 단계 1 완료: 이슈 파싱
          분석 요청이 구조화되었습니다. 다음 단계로 진행합니다."

          gh issue edit $ISSUE_NUMBER --remove-label "auto-analyze"
          gh issue edit $ISSUE_NUMBER --add-label "stage:1-parse"

      # ── 단계 2: 문제 정의 ──────────────────────────────────────────────────

      - name: "[단계 2] 문제 정의"
        if: github.event.label.name == 'stage:1-parse'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          uv run python -c "
          import subprocess, os
          result = subprocess.run(
            ['uv', 'run', 'claude', '--print',
             '--system-prompt', open('.claude/prompts/stage-2-define.md').read(),
             '이슈 코멘트의 파싱 결과를 기반으로 비즈니스 문제를 정의해줘.'],
            capture_output=True, text=True, check=True
          )
          print(result.stdout)
          "

      - name: "[단계 2 완료] 이슈 코멘트 작성 + 라벨 전환"
        if: github.event.label.name == 'stage:1-parse'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "<!-- stage:2-complete -->
          ### ✅ 단계 2 완료: 문제 정의
          비즈니스 문제가 정의되었습니다."

          gh issue edit $ISSUE_NUMBER --remove-label "stage:1-parse"
          gh issue edit $ISSUE_NUMBER --add-label "stage:2-define"

      # ── 단계 3: 산출물 명세 ────────────────────────────────────────────────

      - name: "[단계 3] 산출물 명세"
        if: github.event.label.name == 'stage:2-define'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          uv run python -c "
          import subprocess, os
          result = subprocess.run(
            ['uv', 'run', 'claude', '--print',
             '--system-prompt', open('.claude/prompts/stage-3-deliverables.md').read(),
             '문제 정의를 바탕으로 구체적인 산출물 목록과 파일 경로를 명세해줘.'],
            capture_output=True, text=True, check=True
          )
          print(result.stdout)
          "

      - name: "[단계 3 완료] 이슈 코멘트 작성 + 라벨 전환"
        if: github.event.label.name == 'stage:2-define'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "<!-- stage:3-complete -->
          ### ✅ 단계 3 완료: 산출물 명세
          산출물 목록과 파일 경로가 확정되었습니다."

          gh issue edit $ISSUE_NUMBER --remove-label "stage:2-define"
          gh issue edit $ISSUE_NUMBER --add-label "stage:3-deliverables"

      # ── 단계 4: 분석 스펙 작성 ─────────────────────────────────────────────

      - name: "[단계 4] 분석 스펙 작성"
        if: github.event.label.name == 'stage:3-deliverables'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          uv run python -c "
          import subprocess, os
          result = subprocess.run(
            ['uv', 'run', 'claude', '--print',
             '--system-prompt', open('.claude/prompts/stage-4-spec.md').read(),
             '산출물 명세를 기반으로 dbt 모델과 marimo 노트북 스펙을 작성해줘.'],
            capture_output=True, text=True, check=True
          )
          print(result.stdout)
          "

      - name: "[단계 4 완료] 이슈 코멘트 작성 + 라벨 전환"
        if: github.event.label.name == 'stage:3-deliverables'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "<!-- stage:4-complete -->
          ### ✅ 단계 4 완료: 분석 스펙 작성
          dbt 모델과 노트북 스펙이 작성되었습니다."

          gh issue edit $ISSUE_NUMBER --remove-label "stage:3-deliverables"
          gh issue edit $ISSUE_NUMBER --add-label "stage:4-spec"

      # ── 단계 5: 데이터 추출 ────────────────────────────────────────────────

      - name: "[단계 5] 데이터 추출 (BigQuery)"
        if: github.event.label.name == 'stage:4-spec'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          uv run python -c "
          import subprocess, os
          result = subprocess.run(
            ['uv', 'run', 'claude', '--print',
             '--system-prompt', open('.claude/prompts/stage-5-extract.md').read(),
             'BigQuery에서 데이터를 추출하고 dbt 모델을 실행해줘. 각 쿼리는 1GB 미만 스캔 제한을 준수해야 함.'],
            capture_output=True, text=True, check=True
          )
          print(result.stdout)
          "

      - name: "[단계 5 완료] 이슈 코멘트 작성 + 라벨 전환"
        if: github.event.label.name == 'stage:4-spec'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "<!-- stage:5-complete -->
          ### ✅ 단계 5 완료: 데이터 추출
          BigQuery 데이터 추출과 dbt 모델 실행이 완료되었습니다."

          gh issue edit $ISSUE_NUMBER --remove-label "stage:4-spec"
          gh issue edit $ISSUE_NUMBER --add-label "stage:5-extract"

      # ── 단계 6: 분석 수행 ──────────────────────────────────────────────────

      - name: "[단계 6] 분석 수행 (marimo)"
        if: github.event.label.name == 'stage:5-extract'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          uv run python -c "
          import subprocess, os
          result = subprocess.run(
            ['uv', 'run', 'claude', '--print',
             '--system-prompt', open('.claude/prompts/stage-6-analyze.md').read(),
             'marimo 노트북을 생성하고 데이터 분석을 수행해줘.'],
            capture_output=True, text=True, check=True
          )
          print(result.stdout)
          "

      - name: "[단계 6 완료] 이슈 코멘트 작성 + 라벨 전환"
        if: github.event.label.name == 'stage:5-extract'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "<!-- stage:6-complete -->
          ### ✅ 단계 6 완료: 분석 수행
          marimo 노트북 분석이 완료되었습니다."

          gh issue edit $ISSUE_NUMBER --remove-label "stage:5-extract"
          gh issue edit $ISSUE_NUMBER --add-label "stage:6-analyze"

      # ── 단계 7: 리포트 생성 + PR 생성 ─────────────────────────────────────

      - name: "[단계 7] 리포트 생성"
        if: github.event.label.name == 'stage:6-analyze'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDE_TOKEN }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          uv run python -c "
          import subprocess, os
          result = subprocess.run(
            ['uv', 'run', 'claude', '--print',
             '--system-prompt', open('.claude/prompts/stage-7-report.md').read(),
             'marimo 노트북을 HTML로 렌더링하고 분석 리포트를 생성해줘.'],
            capture_output=True, text=True, check=True
          )
          print(result.stdout)
          "

      - name: "[단계 7] HTML 아티팩트 업로드"
        if: github.event.label.name == 'stage:6-analyze'
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report-${{ steps.issue.outputs.number }}
          path: |
            reports/*.html
            reports/*.pdf
          if-no-files-found: warn

      - name: "[단계 7] 분석 결과 커밋"
        if: github.event.label.name == 'stage:6-analyze'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "analysis/issue-$ISSUE_NUMBER"
          git add -A
          git diff --staged --quiet || git commit -m "feat: issue #$ISSUE_NUMBER 자동 분석 결과"
          git push origin "analysis/issue-$ISSUE_NUMBER"

      - name: "[단계 7] PR 생성"
        if: github.event.label.name == 'stage:6-analyze'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh pr create \
            --title "분석 완료: Issue #$ISSUE_NUMBER" \
            --body "## 분석 요약

          Issue #$ISSUE_NUMBER 의 자동 분석 결과입니다.

          ### 산출물
          - dbt 모델: \`models/marts/\`
          - marimo 노트북: \`notebooks/\`
          - HTML 리포트: GitHub Actions Artifacts

          ### 파이프라인 실행 이력
          Issue #$ISSUE_NUMBER 의 라벨 전환 이력을 확인하세요.

          Closes #$ISSUE_NUMBER" \
            --label "auto-analyzed" \
            --head "analysis/issue-$ISSUE_NUMBER"

      - name: "[단계 7 완료] 이슈 코멘트 작성 + done 라벨 부착"
        if: github.event.label.name == 'stage:6-analyze'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue comment $ISSUE_NUMBER --body "<!-- stage:7-complete -->
          ### ✅ 단계 7 완료: 리포트 생성
          분석이 완료되었습니다. PR이 생성되었으며 HTML 리포트는 Actions Artifacts에서 확인할 수 있습니다."

          gh issue edit $ISSUE_NUMBER --remove-label "stage:6-analyze"
          gh issue edit $ISSUE_NUMBER --add-label "done"

      # ── 오류 처리 ──────────────────────────────────────────────────────────

      - name: "오류 처리: stage:error 라벨 부착"
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          # 오류 카테고리 판별
          # INFRA: GCP 인증 실패, BigQuery 오류
          # AGENT: Claude SDK 실행 실패
          # WORKFLOW: 라벨 전환 실패, 권한 오류
          ERROR_CATEGORY="AGENT"

          gh issue comment $ISSUE_NUMBER --body "<!-- error-category: $ERROR_CATEGORY -->
          ### ❌ 파이프라인 오류 발생

          **오류 카테고리**: \`$ERROR_CATEGORY\`
          **실패한 단계**: \`${{ github.event.label.name }}\`
          **Actions 실행 로그**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          **복구 방법**:
          1. 위 로그에서 오류 원인 확인
          2. 문제 수정 후 \`stage:error\` 라벨 제거
          3. 실패한 단계 라벨(\`${{ github.event.label.name }}\`)을 다시 부착하면 해당 단계부터 재개됩니다"

          gh issue edit $ISSUE_NUMBER --add-label "stage:error"
