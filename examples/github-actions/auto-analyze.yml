# auto-analyze.yml — 7단계 자동 분석 워크플로
# .github/workflows/auto-analyze.yml에 배치
#
# 트리거: GitHub Issue에 라벨이 부착될 때
# 동작: 라벨에 따라 해당 분석 단계를 Claude Agent SDK로 실행
# 라벨 시퀀스: auto-analyze → stage:1-problem → ... → stage:7-report → done

name: 자동 분석 파이프라인

on:
  issues:
    types: [labeled]

# 동시 실행 방지 — 같은 이슈에 대해 하나의 워크플로만 실행
concurrency:
  group: analysis-${{ github.event.issue.number }}
  cancel-in-progress: false

permissions:
  issues: write
  contents: write
  pull-requests: write

env:
  # BigQuery 인증 — GCP 서비스 계정 JSON (GitHub Secret)
  GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
  BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
  # Claude Agent SDK 인증
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  # Git 작업 인증
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # ─────────────────────────────────────────────
  # 라벨 라우팅: 부착된 라벨에 따라 실행 단계 결정
  # ─────────────────────────────────────────────
  route:
    runs-on: ubuntu-latest
    outputs:
      stage: ${{ steps.detect.outputs.stage }}
      should_run: ${{ steps.detect.outputs.should_run }}
    steps:
      - name: 트리거 라벨 확인
        id: detect
        run: |
          LABEL="${{ github.event.label.name }}"
          echo "부착된 라벨: $LABEL"

          case "$LABEL" in
            "auto-analyze")   echo "stage=init" >> $GITHUB_OUTPUT ;;
            "stage:1-problem")  echo "stage=1-problem" >> $GITHUB_OUTPUT ;;
            "stage:2-deliverables") echo "stage=2-deliverables" >> $GITHUB_OUTPUT ;;
            "stage:3-spec")     echo "stage=3-spec" >> $GITHUB_OUTPUT ;;
            "stage:4-extract")  echo "stage=4-extract" >> $GITHUB_OUTPUT ;;
            "stage:5-analyze")  echo "stage=5-analyze" >> $GITHUB_OUTPUT ;;
            "stage:6-report")   echo "stage=6-report" >> $GITHUB_OUTPUT ;;
            "stage:7-pr")       echo "stage=7-pr" >> $GITHUB_OUTPUT ;;
            *)
              echo "should_run=false" >> $GITHUB_OUTPUT
              echo "무관한 라벨 — 건너뜀"
              exit 0
              ;;
          esac
          echo "should_run=true" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # 분석 실행: Claude Agent SDK로 해당 단계 수행
  # ─────────────────────────────────────────────
  execute:
    needs: route
    if: needs.route.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python/uv 설정
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: 의존성 설치
        run: |
          uv sync
          uv run dbt deps

      - name: GCP 인증 설정
        run: |
          # 서비스 계정 JSON을 임시 파일로 저장
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> $GITHUB_ENV

      - name: Claude Agent SDK 설정
        run: |
          # Claude Agent SDK 토큰 설정
          npx @anthropic-ai/claude-code setup-ci

      - name: 이슈 본문 읽기
        id: issue
        run: |
          # GitHub API로 이슈 본문 및 코멘트 가져오기
          ISSUE_BODY=$(gh issue view ${{ github.event.issue.number }} --json body -q '.body')
          echo "issue_body<<EOF" >> $GITHUB_OUTPUT
          echo "$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # ─── 초기화: auto-analyze → stage:1-problem ───
      - name: "초기화 — 분석 요청 접수"
        if: needs.route.outputs.stage == 'init'
        run: |
          # auto-analyze 라벨 제거, stage:1-problem 부착
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "auto-analyze" \
            --add-label "stage:1-problem"

          gh issue comment ${{ github.event.issue.number }} \
            --body "🚀 자동 분석 파이프라인이 시작되었습니다. Stage 1: 문제 정의 단계로 진입합니다."

      # ─── Stage 1: 문제 정의 ───
      - name: "Stage 1 — 문제 정의"
        if: needs.route.outputs.stage == '1-problem'
        run: |
          # Claude Agent SDK로 문제 정의 수행
          RESULT=$(npx @anthropic-ai/claude-code --print \
            "이슈 #${{ github.event.issue.number }}의 분석 요청을 분석하여 문제를 정의하세요.

            이슈 본문:
            ${{ steps.issue.outputs.issue_body }}

            다음을 작성하세요:
            1. 분석 목적 (1-2문장)
            2. 핵심 질문 (3-5개)
            3. 분석 범위 (기간, 세그먼트, 제외 조건)

            결과를 이슈 코멘트로 작성하세요.")

          # 결과를 이슈 코멘트로 게시
          gh issue comment ${{ github.event.issue.number }} \
            --body "## Stage 1: 문제 정의 완료

          $RESULT"

          # 라벨 전환: stage:1 → stage:2
          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "stage:1-problem" \
            --add-label "stage:2-deliverables"

      # ─── Stage 2: 산출물 명세 ───
      - name: "Stage 2 — 산출물 명세"
        if: needs.route.outputs.stage == '2-deliverables'
        run: |
          npx @anthropic-ai/claude-code --print \
            "이슈 #${{ github.event.issue.number }}의 이전 Stage 1 코멘트를 읽고,
            분석 산출물을 명세하세요:
            1. 필요한 dbt 모델 목록
            2. marimo 노트북 구조 (셀 구성)
            3. 최종 리포트에 포함할 차트/테이블
            4. 예상 데이터 소스와 조인 관계

            결과를 이슈 코멘트로 작성하세요." \
            | xargs -0 gh issue comment ${{ github.event.issue.number }} --body

          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "stage:2-deliverables" \
            --add-label "stage:3-spec"

      # ─── Stage 3: 분석 스펙 작성 ───
      - name: "Stage 3 — 분석 스펙"
        if: needs.route.outputs.stage == '3-spec'
        run: |
          npx @anthropic-ai/claude-code --print \
            "이슈 #${{ github.event.issue.number }}의 이전 코멘트들을 읽고,
            구체적인 분석 스펙을 작성하세요:
            1. SQL 쿼리 계획 (사용할 테이블, 조인, 집계)
            2. dbt 모델 변경/추가 계획
            3. marimo 노트북 셀별 상세 설계
            4. 검증 기준 (expected range, sanity check)

            결과를 이슈 코멘트로 작성하세요." \
            | xargs -0 gh issue comment ${{ github.event.issue.number }} --body

          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "stage:3-spec" \
            --add-label "stage:4-extract"

      # ─── Stage 4: 데이터 추출 ───
      - name: "Stage 4 — 데이터 추출"
        if: needs.route.outputs.stage == '4-extract'
        run: |
          # Claude Agent SDK로 dbt 모델 실행
          npx @anthropic-ai/claude-code \
            "이슈 #${{ github.event.issue.number }}의 스펙에 따라 데이터를 추출하세요:
            1. 필요한 dbt 모델을 실행하세요: dbt run
            2. 추가 쿼리가 필요하면 models/marts/ 에 새 모델을 작성하세요
            3. dbt test로 데이터 품질을 검증하세요
            4. 실행 결과를 이슈 코멘트로 보고하세요"

          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "stage:4-extract" \
            --add-label "stage:5-analyze"

      # ─── Stage 5: 분석 수행 ───
      - name: "Stage 5 — 분석 수행"
        if: needs.route.outputs.stage == '5-analyze'
        run: |
          # Claude Agent SDK로 marimo 노트북 생성 및 분석
          npx @anthropic-ai/claude-code \
            "이슈 #${{ github.event.issue.number }}의 스펙에 따라 분석을 수행하세요:
            1. notebooks/analysis_${{ github.event.issue.number }}.py 에 marimo 노트북을 작성하세요
            2. BigQuery에서 데이터를 조회하여 분석하세요
            3. 차트와 테이블로 결과를 시각화하세요
            4. 핵심 발견 사항을 요약하세요

            marimo 노트북 규약:
            - 첫 번째 셀: 분석 요약
            - 차트 제목/축: 한국어
            - 마지막 셀: 결론 및 제안"

          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "stage:5-analyze" \
            --add-label "stage:6-report"

      # ─── Stage 6: 리포트 생성 ───
      - name: "Stage 6 — 리포트 생성"
        if: needs.route.outputs.stage == '6-report'
        run: |
          NOTEBOOK="notebooks/analysis_${{ github.event.issue.number }}.py"

          # marimo → HTML 내보내기
          uv run python -m marimo export html "$NOTEBOOK" \
            -o "reports/analysis_${{ github.event.issue.number }}.html"

          echo "✅ HTML 리포트 생성 완료"

          gh issue edit ${{ github.event.issue.number }} \
            --remove-label "stage:6-report" \
            --add-label "stage:7-pr"

      # ─── Stage 7: PR 생성 ───
      - name: "Stage 7 — PR 생성"
        if: needs.route.outputs.stage == '7-pr'
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          BRANCH="analysis/issue-${ISSUE_NUM}"

          # 분석 브랜치 생성 및 변경 사항 커밋
          git checkout -b "$BRANCH"
          git add models/ notebooks/ || true
          git commit -m "feat: 이슈 #${ISSUE_NUM} 분석 — dbt 모델 + marimo 노트북

          Closes #${ISSUE_NUM}" || echo "변경 사항 없음"

          git push origin "$BRANCH"

          # PR 생성 (dbt 모델 + marimo 소스만 포함, HTML 제외)
          gh pr create \
            --title "분석: $(gh issue view $ISSUE_NUM --json title -q '.title')" \
            --body "## 분석 결과

          이슈 #${ISSUE_NUM}에 대한 자동 분석 결과입니다.

          ### 포함된 파일
          - dbt 모델/쿼리 변경
          - marimo 노트북 소스 (.py)

          ### 리포트
          HTML/PDF 리포트는 GitHub Actions 아티팩트에서 다운로드할 수 있습니다.

          Closes #${ISSUE_NUM}" \
            --head "$BRANCH"

          # 완료 라벨
          gh issue edit $ISSUE_NUM \
            --remove-label "stage:7-pr" \
            --add-label "done"

          gh issue comment $ISSUE_NUM \
            --body "✅ 자동 분석 파이프라인이 완료되었습니다. PR이 생성되었습니다."

      # ─── 리포트 아티팩트 업로드 ───
      - name: 리포트 아티팩트 업로드
        if: needs.route.outputs.stage == '6-report' || needs.route.outputs.stage == '7-pr'
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report-${{ github.event.issue.number }}
          path: reports/
          retention-days: 30

      # ─── 에러 처리 ───
      - name: 에러 시 라벨 부착
        if: failure()
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --add-label "status:error"
          gh issue comment ${{ github.event.issue.number }} \
            --body "❌ 워크플로 실행 중 에러가 발생했습니다.

          **실패 단계**: ${{ needs.route.outputs.stage }}
          **워크플로 로그**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          \`status:error\` 라벨을 제거하고 실패한 단계 라벨을 다시 부착하면 재시도합니다."
