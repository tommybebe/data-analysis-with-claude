# schema.yml — 마트 레이어 모델 정의
# 최종 분석 지표 테이블의 컬럼 정의 및 테스트 명세
# BigQuery TABLE로 구체화, 파티션 적용

version: 2

models:
  # ============================================================
  # fct_daily_active_users: DAU 집계 마트
  # ============================================================
  - name: fct_daily_active_users
    description: >
      일간 활성 사용자(DAU) 집계 팩트 테이블.
      날짜·플랫폼별 DAU, 신규/재방문 사용자 수, 세션·이벤트·수익 지표 포함.
      BigQuery에서 activity_date로 파티셔닝. marimo DAU/MAU 분석 노트북의 주요 데이터 소스.

    config:
      materialized: table
      partition_by:
        field: activity_date
        data_type: date
        granularity: day

    data_tests:
      # activity_date + platform 조합은 유일해야 함
      - unique:
          column_name: "concat(cast(activity_date as string), '_', platform)"

    columns:
      - name: activity_date
        description: "활동 일자 (KST 기준). 테이블 파티션 키."
        data_tests:
          - not_null

      - name: platform
        description: "앱 플랫폼 (ios / android / total). total은 전체 플랫폼 합산 행."
        data_tests:
          - not_null
          - accepted_values:
              values: ['ios', 'android']

      - name: dau
        description: >
          일간 활성 사용자 수 (DAU).
          정의: 해당 날짜에 1개 이상의 이벤트를 발생시킨 고유 사용자 수.
        data_tests:
          - not_null

      - name: new_users
        description: "당일 신규 가입 사용자 수 (가입일 = 활동일)"
        data_tests:
          - not_null

      - name: returning_users
        description: "재방문 사용자 수 (DAU - new_users)"
        data_tests:
          - not_null

      - name: total_sessions
        description: "당일 전체 세션 수"
        data_tests:
          - not_null

      - name: total_events
        description: "당일 전체 이벤트 수"
        data_tests:
          - not_null

      - name: avg_sessions_per_user
        description: "사용자당 평균 세션 수 (소수점 2자리 반올림)"

      - name: avg_events_per_user
        description: "사용자당 평균 이벤트 수 (소수점 2자리 반올림)"

      - name: total_revenue
        description: "당일 총 수익 (원화, purchase 이벤트의 price_krw 합산)"
        data_tests:
          - not_null

      - name: avg_revenue_per_user
        description: "사용자당 평균 수익 (원화)"

      - name: premium_dau
        description: "유료 구독 사용자 수 (subscription_tier: premium 또는 premium_plus)"
        data_tests:
          - not_null

      - name: premium_ratio
        description: >
          유료 구독 사용자 비율 (premium_dau / dau).
          0~1 범위. 구독 전환율 모니터링 지표.

  # ============================================================
  # fct_monthly_active_users: MAU 집계 마트
  # ============================================================
  - name: fct_monthly_active_users
    description: >
      월간 활성 사용자(MAU) 집계 팩트 테이블.
      월별·플랫폼별 MAU, DAU/MAU stickiness 비율, 월간 수익 포함.
      BigQuery에서 activity_month로 파티셔닝 (월 단위).

    config:
      materialized: table
      partition_by:
        field: activity_month
        data_type: date
        granularity: month

    data_tests:
      - unique:
          column_name: "concat(cast(activity_month as string), '_', platform)"

    columns:
      - name: activity_month
        description: "활동 월 (KST 기준, 월의 첫째 날로 표현). 테이블 파티션 키."
        data_tests:
          - not_null

      - name: platform
        description: "앱 플랫폼 (ios / android)"
        data_tests:
          - not_null
          - accepted_values:
              values: ['ios', 'android']

      - name: mau
        description: >
          월간 활성 사용자 수 (MAU).
          정의: 해당 월에 1개 이상의 이벤트를 발생시킨 고유 사용자 수.
        data_tests:
          - not_null

      - name: new_users
        description: "해당 월에 신규 가입한 사용자 수"
        data_tests:
          - not_null

      - name: returning_users
        description: "해당 월에 재방문한 사용자 수 (MAU - new_users)"
        data_tests:
          - not_null

      - name: avg_active_days_per_user
        description: "사용자당 월 평균 활동 일수 (소수점 1자리)"

      - name: avg_sessions_per_user
        description: "사용자당 월 평균 세션 수 (소수점 1자리)"

      - name: total_revenue
        description: "월간 총 수익 (원화, 소수점 2자리)"
        data_tests:
          - not_null

      - name: premium_mau
        description: "유료 구독 MAU (premium + premium_plus)"
        data_tests:
          - not_null

      - name: stickiness
        description: >
          DAU/MAU 비율 (평균 DAU ÷ MAU).
          0~1 범위. 높을수록 사용자가 월 중 자주 방문.
          업계 평균 20~25%를 기준점으로 활용.

      - name: avg_dau
        description: "해당 월의 일평균 DAU (fct_daily_active_users에서 산출)"

  # ============================================================
  # fct_retention_cohort: 코호트 리텐션 마트
  # ============================================================
  - name: fct_retention_cohort
    description: >
      코호트 리텐션 팩트 테이블.
      가입 주(cohort_week) 기준 week-N(0~12주차) 잔존율 계산.
      DAU/MAU와 함께 사용자 이탈 패턴 분석 및 제품 개선 방향 도출에 활용.
      marimo 리텐션 분석 노트북에서 히트맵 시각화 데이터 소스.

    config:
      materialized: table

    columns:
      - name: cohort_week
        description: "코호트 기준 주 시작일 (월요일 기준). 예: 2025-01-06."
        data_tests:
          - not_null

      - name: cohort_users
        description: "해당 주에 가입한 코호트의 전체 사용자 수"
        data_tests:
          - not_null

      - name: weeks_since_signup
        description: >
          가입 주 대비 경과 주차 (0 = 가입 주, 1 = 다음 주, ..., 12 = 12주 후).
          0주차 잔존율은 정의상 100%.
        data_tests:
          - not_null

      - name: retained_users
        description: "해당 주차에 활동한 코호트 사용자 수"
        data_tests:
          - not_null

      - name: retention_rate
        description: >
          잔존율 (retained_users / cohort_users).
          0~1 범위. week-0은 항상 1.0.
          예: 0.42 = 42%가 해당 주차에 재방문.
        data_tests:
          - not_null

  # ============================================================
  # fct_feature_engagement: 기능별 참여도 분석 마트
  # ============================================================
  - name: fct_feature_engagement
    description: >
      기능별 일간 참여도 팩트 테이블.
      운동(workout), 목표 설정(goal), 소셜 공유(social_share), 구매(purchase) 기능의
      채택률(adoption_rate)과 완료율(completion_rate)을 날짜별로 집계.
      기능 우선순위 결정, A/B 테스트 평가, 제품 개선 방향 도출에 활용.
      BigQuery에서 activity_date로 파티셔닝.

    config:
      materialized: table
      partition_by:
        field: activity_date
        data_type: date
        granularity: day

    columns:
      - name: activity_date
        description: "활동 일자 (KST 기준). 테이블 파티션 키."
        data_tests:
          - not_null

      - name: dau
        description: "해당 날짜의 전체 DAU (모든 비율의 분모)"
        data_tests:
          - not_null

      - name: workout_users
        description: "당일 운동을 1회 이상 시작한 사용자 수"
        data_tests:
          - not_null

      - name: workout_completers
        description: "당일 운동을 1회 이상 완료한 사용자 수"
        data_tests:
          - not_null

      - name: total_workout_starts
        description: "당일 전체 운동 시작 건수"

      - name: total_workout_completes
        description: "당일 전체 운동 완료 건수"

      - name: workout_adoption_rate
        description: >
          운동 기능 채택률 (workout_users / dau). 0~1 범위.
          기준값: 0.30 이상이면 핵심 기능으로서 건강한 수준.

      - name: workout_completion_rate
        description: >
          운동 완료율 (total_workout_completes / total_workout_starts). 0~1 범위.
          낮은 값은 운동 프로그램 난이도·길이 재검토 신호.

      - name: goal_setters
        description: "당일 목표를 1개 이상 설정한 사용자 수"

      - name: goal_achievers
        description: "당일 목표를 1개 이상 달성한 사용자 수"

      - name: total_goals_set
        description: "당일 설정된 목표 건수"

      - name: total_goals_achieved
        description: "당일 달성된 목표 건수"

      - name: goal_adoption_rate
        description: "목표 기능 채택률 (goal_setters / dau). 0~1 범위."

      - name: goal_achievement_rate
        description: "목표 달성률 (total_goals_achieved / total_goals_set). 0~1 범위."

      - name: social_sharers
        description: "당일 1회 이상 소셜 공유한 사용자 수 (바이럴 루프 기여자)"

      - name: total_shares
        description: "당일 전체 소셜 공유 건수"

      - name: social_adoption_rate
        description: "소셜 기능 채택률. 바이럴 계수 추정의 선행 지표."

      - name: avg_shares_per_sharer
        description: "공유자 1인당 평균 공유 횟수 (소수점 2자리)"

      - name: purchasers
        description: "당일 1건 이상 구매한 사용자 수"

      - name: total_purchases
        description: "당일 전체 구매 건수"

      - name: total_revenue_krw
        description: "당일 총 구매 수익 (원화)"

      - name: purchase_conversion_rate
        description: "일간 결제 전환율 (purchasers / dau). 0~1 범위."

      - name: revenue_per_purchaser_krw
        description: "구매자 1인당 평균 결제 금액 (ARPPU 일간 추정치, 원화)"

  # ============================================================
  # fct_revenue_analysis: 수익·monetization 분석 마트
  # ============================================================
  - name: fct_revenue_analysis
    description: >
      월간 수익 분석 팩트 테이블.
      구독 등급(subscription_tier)별 MAU, ARPU, ARPPU, 결제 전환율을 월별로 집계.
      LTV 추정, 마케팅 ROI 분석, 구독 전환 최적화, 시장별 monetization 전략 수립에 활용.
      BigQuery에서 activity_month로 파티셔닝 (월 단위).

    config:
      materialized: table
      partition_by:
        field: activity_month
        data_type: date
        granularity: month

    columns:
      - name: activity_month
        description: "활동 월 (KST 기준, 월의 첫째 날로 표현). 테이블 파티션 키."
        data_tests:
          - not_null

      - name: subscription_tier
        description: "구독 등급 (free / premium / premium_plus)"
        data_tests:
          - not_null
          - accepted_values:
              values: ['free', 'premium', 'premium_plus']

      - name: mau
        description: "월간 활성 사용자 수 (MAU)"
        data_tests:
          - not_null

      - name: new_mau
        description: "해당 월에 신규 가입한 MAU"
        data_tests:
          - not_null

      - name: returning_mau
        description: "이전 가입 후 해당 월에 활동한 재방문 MAU"
        data_tests:
          - not_null

      - name: paying_users
        description: "해당 월에 1건 이상 구매한 사용자 수"
        data_tests:
          - not_null

      - name: total_revenue_krw
        description: "월간 총 수익 (원화, 반올림)"
        data_tests:
          - not_null

      - name: total_purchases
        description: "월간 전체 구매 건수"

      - name: arpu_krw
        description: >
          ARPU (Average Revenue Per User). 월간 총 수익 ÷ MAU.
          마케팅 투자 효율성 측정 지표. 단위: 원.

      - name: arppu_krw
        description: >
          ARPPU (Average Revenue Per Paying User). 월간 총 수익 ÷ 결제 사용자 수.
          결제 사용자 가치 측정 지표. 단위: 원.

      - name: payment_conversion_rate
        description: >
          결제 전환율 (paying_users / mau). 0~1 범위.
          구독 전환 최적화의 핵심 지표.

      - name: new_user_ratio
        description: "신규 사용자 비율 (new_mau / mau). 사용자 획득 효율 지표."

      - name: revenue_share_of_month
        description: >
          해당 구독 등급의 월 전체 수익 기여 비율 (0~1).
          동일 월 내 모든 구독 등급 합계 = 1.0.

  # ============================================================
  # fct_user_segments: 사용자 세그먼트 스냅샷 마트
  # ============================================================
  - name: fct_user_segments
    description: >
      사용자 세그먼트 집계 스냅샷 테이블.
      activity_segment(power_user/regular/casual/dormant/churned)와
      revenue_segment(high_value/mid_value/low_value/non_paying) 교차 기준으로
      사용자 분포, 행동 지표, 수익 지표를 집계.
      대시보드 세그먼트 현황판, 타겟 마케팅 캠페인 구성, 재참여 우선순위 결정에 활용.
      주의: 실행 시점 스냅샷. 시계열 세그먼트 변화 추적은 dbt Snapshot 사용.

    config:
      materialized: table

    columns:
      - name: activity_segment
        description: >
          활동 빈도 기반 사용자 세그먼트.
          - power_user: 활동일 20일 이상
          - regular: 활동일 10~19일
          - casual: 활동일 3~9일
          - dormant: 활동일 3일 미만 (최근 30일 내 활동)
          - churned: 30일 이상 미접속
        data_tests:
          - not_null
          - accepted_values:
              values: ['power_user', 'regular', 'casual', 'dormant', 'churned']

      - name: revenue_segment
        description: >
          수익 기반 사용자 세그먼트.
          - high_value: 누적 수익 10만원 이상
          - mid_value: 누적 수익 1만원 이상
          - low_value: 구매 이력 있음 (1만원 미만)
          - non_paying: 구매 이력 없음
        data_tests:
          - not_null
          - accepted_values:
              values: ['high_value', 'mid_value', 'low_value', 'non_paying']

      - name: subscription_tier
        description: "구독 등급 (free / premium / premium_plus)"

      - name: referral_source
        description: "유입 채널 (organic, paid_search, social, referral)"

      - name: country
        description: "국가 코드 (ISO 3166-1 alpha-2)"

      - name: platform
        description: "앱 플랫폼 (ios / android)"

      - name: user_count
        description: "해당 세그먼트 조합의 사용자 수"
        data_tests:
          - not_null

      - name: user_share
        description: "전체 사용자 대비 해당 세그먼트 비율 (0~1)"

      - name: avg_active_days
        description: "세그먼트 내 사용자의 평균 활동 일수"

      - name: avg_activity_density
        description: >
          활동 밀도: 가입 경과일 대비 활동일 비율 (0~1).
          1.0에 가까울수록 매일 사용하는 헤비 유저.

      - name: avg_daily_session_minutes
        description: "세그먼트 내 사용자의 일평균 세션 시간 (분)"

      - name: avg_lifetime_workouts
        description: "세그먼트 내 사용자의 평균 누적 운동 완료 수"

      - name: avg_workout_completion_rate
        description: "세그먼트 내 사용자의 평균 운동 완료율 (0~1)"

      - name: paying_user_rate
        description: "세그먼트 내 구매 이력 있는 사용자 비율 (0~1)"

      - name: avg_ltv_krw
        description: "세그먼트 내 사용자 1인당 평균 누적 수익 (LTV 추정치, 원화)"

      - name: total_ltv_krw
        description: "세그먼트 전체 누적 수익 합계 (원화)"

      - name: max_ltv_krw
        description: "세그먼트 내 최고 개인 누적 수익 (이상치 탐지용)"

      - name: activation_rate
        description: >
          활성화율: 가입 후 7일 이내에 첫 이벤트를 발생시킨 사용자 비율.
          온보딩 성공률 지표.

      - name: avg_days_to_first_activity
        description: "평균 첫 활동까지 소요 일수 (가입일 기준). 0이면 가입 당일 활동."

      - name: avg_days_since_last_activity
        description: "마지막 활동 이후 평균 경과일. 높을수록 이탈 위험."

      - name: reengagement_priority_score
        description: >
          재참여 마케팅 우선순위 점수 (높을수록 우선 대상).
          공식: (avg_ltv_krw / 1000) × ln(avg_days_since_last_activity + 1).
          가치 높고 오래 미접속한 사용자를 우선 타겟팅.
