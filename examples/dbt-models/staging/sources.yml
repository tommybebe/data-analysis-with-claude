# dbt 소스 정의 — B2C 모바일 앱 이벤트 데이터
# 스타터 레포에 포함되는 기본 소스 설정

version: 2

sources:
  - name: mobile_app_raw
    description: >
      B2C 모바일 앱의 원시 이벤트 데이터.
      합성 데이터 생성 스크립트(generate_synthetic_data.py)로 생성된 테스트 데이터 포함.
    database: "{{ env_var('BQ_PROJECT_ID') }}"
    schema: raw
    loader: synthetic_data_generator

    freshness:
      # 소스 데이터 신선도 검사 — 데이터 파이프라인 지연 감지
      warn_after: { count: 24, period: hour }
      error_after: { count: 48, period: hour }

    loaded_at_field: _loaded_at

    tables:
      - name: raw_events
        description: >
          앱 내 개별 사용자 행동 이벤트 로그.
          이벤트 1건 = 1행. 약 500,000행의 합성 데이터.
        columns:
          - name: event_id
            description: "이벤트 고유 식별자 (UUID v4)"
            data_tests:
              - unique
              - not_null

          - name: event_timestamp
            description: "이벤트 발생 시각 (UTC)"
            data_tests:
              - not_null

          - name: user_id
            description: "사용자 고유 식별자, raw_users.user_id 참조"
            data_tests:
              - not_null
              - relationships:
                  to: source('mobile_app_raw', 'raw_users')
                  field: user_id

          - name: session_id
            description: "세션 식별자, raw_sessions.session_id 참조"
            data_tests:
              - not_null
              - relationships:
                  to: source('mobile_app_raw', 'raw_sessions')
                  field: session_id

          - name: event_type
            description: >
              이벤트 유형. 가능한 값:
              app_open, app_close, screen_view, workout_start,
              workout_complete, goal_set, goal_achieved, social_share,
              purchase, push_notification_open
            data_tests:
              - not_null
              - accepted_values:
                  values:
                    - app_open
                    - app_close
                    - screen_view
                    - workout_start
                    - workout_complete
                    - goal_set
                    - goal_achieved
                    - social_share
                    - purchase
                    - push_notification_open

          - name: event_date
            description: "이벤트 발생 일자 (UTC 기준, 파티션 키)"
            data_tests:
              - not_null

          - name: platform
            description: "앱 플랫폼 (ios / android)"
            data_tests:
              - not_null
              - accepted_values:
                  values: ['ios', 'android']

          - name: app_version
            description: "앱 버전 (semver 형식, 예: 3.2.1)"
            data_tests:
              - not_null

          - name: device_model
            description: "디바이스 모델명 (예: iPhone 16 Pro, Galaxy S25)"

          - name: event_properties
            description: "이벤트별 부가 속성 (JSON 문자열)"

      - name: raw_users
        description: >
          사용자 프로필 및 가입 정보.
          사용자 1명 = 1행. 약 10,000행의 합성 데이터.
        columns:
          - name: user_id
            description: "사용자 고유 식별자 (UUID v4)"
            data_tests:
              - unique
              - not_null

          - name: signup_timestamp
            description: "가입 시각 (UTC)"
            data_tests:
              - not_null

          - name: signup_date
            description: "가입 일자 (UTC 기준)"
            data_tests:
              - not_null

          - name: country
            description: "사용자 국가 코드 (ISO 3166-1 alpha-2, 예: KR, US, JP)"
            data_tests:
              - not_null

          - name: language
            description: "사용자 언어 코드 (예: ko, en, ja)"

          - name: platform
            description: "앱 플랫폼 (ios / android)"
            data_tests:
              - not_null
              - accepted_values:
                  values: ['ios', 'android']

          - name: device_type
            description: "디바이스 유형 (smartphone / tablet)"
            data_tests:
              - not_null
              - accepted_values:
                  values: ['smartphone', 'tablet']

          - name: initial_app_version
            description: "가입 시점 앱 버전 (semver 형식, 예: 3.2.1)"
            data_tests:
              - not_null

          - name: subscription_tier
            description: "구독 등급 (free, premium, premium_plus)"
            data_tests:
              - not_null
              - accepted_values:
                  values: ['free', 'premium', 'premium_plus']

          - name: age_group
            description: "연령대 (18-24, 25-34, 35-44, 45-54, 55+), 미입력 가능"

          - name: referral_source
            description: "유입 채널 (organic, paid_search, social, referral)"
            data_tests:
              - accepted_values:
                  values: ['organic', 'paid_search', 'social', 'referral']

          - name: is_active
            description: "활성 사용자 여부"
            data_tests:
              - not_null

          - name: last_active_date
            description: "마지막 활동 일자"

      - name: raw_sessions
        description: >
          앱 세션(접속) 기록.
          세션 1건 = 1행. 약 150,000행의 합성 데이터.
        columns:
          - name: session_id
            description: "세션 고유 식별자 (UUID v4)"
            data_tests:
              - unique
              - not_null

          - name: user_id
            description: "사용자 식별자, raw_users.user_id 참조"
            data_tests:
              - not_null
              - relationships:
                  to: source('mobile_app_raw', 'raw_users')
                  field: user_id

          - name: session_start
            description: "세션 시작 시각 (UTC)"
            data_tests:
              - not_null

          - name: session_end
            description: "세션 종료 시각 (UTC, NULL이면 비정상 종료)"

          - name: session_date
            description: "세션 시작 일자 (UTC 기준, 파티션 키)"
            data_tests:
              - not_null

          - name: session_duration_seconds
            description: "세션 지속 시간 (초), 비정상 종료 시 NULL"

          - name: platform
            description: "앱 플랫폼 (ios / android)"
            data_tests:
              - accepted_values:
                  values: ['ios', 'android']

          - name: app_version
            description: "앱 버전 (semver 형식, 예: 3.2.1)"

          - name: device_model
            description: "디바이스 모델명 (예: iPhone 16 Pro, Galaxy S25)"

          - name: os_version
            description: "OS 버전 (예: iOS 19.0, Android 16)"

          - name: ip_country
            description: "접속 국가 코드 (IP 기반)"

          - name: event_count
            description: "세션 내 이벤트 수"
            data_tests:
              - not_null

          - name: screen_count
            description: "세션 내 screen_view 이벤트 수 (이벤트 생성 후 역산)"
            data_tests:
              - not_null
