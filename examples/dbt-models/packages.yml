# packages.yml
# dbt 패키지 의존성 정의
# `dbt deps` 명령으로 설치

packages:
  # dbt-utils: 범용 매크로 모음 (generate_surrogate_key, date_spine 등)
  - package: dbt-labs/dbt_utils
    version: [">=1.3.0", "<2.0.0"]

  # dbt-expectations: Great Expectations 스타일의 데이터 품질 테스트
  # 값 범위 검사, 분포 검사, 커스텀 SQL 테스트 등
  - package: calogica/dbt_expectations
    version: [">=0.10.0", "<1.0.0"]
